<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <!-- OG / LinkedIn meta — populated dynamically -->
  <meta property="og:type" content="article"/>
  <meta property="og:site_name" content="MetroAir Inc."/>
  <meta id="og-title" property="og:title" content="MetroAir Exhibition"/>
  <meta id="og-description" property="og:description" content="MetroAir Inc. — Urban Air Mobility"/>
  <meta id="og-image" property="og:image" content=""/>
  <meta id="og-url" property="og:url" content=""/>
  <meta name="twitter:card" content="summary_large_image"/>
  <meta id="tw-title" name="twitter:title" content="MetroAir Exhibition"/>
  <meta id="tw-description" name="twitter:description" content="MetroAir Inc. — Urban Air Mobility"/>
  <meta id="tw-image" name="twitter:image" content=""/>
  <title id="page-title">Exhibition — MetroAir Inc.</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --navy:#092554;--blue:#355A94;--fog:#ECF2F5;
      --white:#ffffff;--dark:#070e1f;--mid:#0d1e3a;--accent:#4d9de0;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{font-family:'Inter',sans-serif;background:var(--dark);color:var(--white);overflow-x:hidden;}

    /* NAV */
    nav{
      position:fixed;top:0;left:0;right:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:16px 60px;backdrop-filter:blur(14px);
      background:rgba(7,14,31,0.85);border-bottom:1px solid rgba(53,90,148,0.2);
    }
    nav img{height:36px;mix-blend-mode:screen;filter:brightness(1.4) contrast(1.1);}
    nav ul{list-style:none;display:flex;gap:32px;}
    nav ul a{
      font-family:'Rajdhani',sans-serif;font-weight:600;font-size:0.85rem;
      letter-spacing:0.14em;text-decoration:none;color:rgba(255,255,255,0.6);
      text-transform:uppercase;transition:color 0.2s;
    }
    nav ul a:hover,nav ul a.active{color:var(--white);}
    nav ul a.active{border-bottom:1px solid var(--accent);padding-bottom:2px;}

    .back-banner{
      margin-top:69px;background:rgba(9,37,84,0.4);
      border-bottom:1px solid rgba(53,90,148,0.2);padding:10px 60px;
    }
    .back-banner a{
      font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:700;
      letter-spacing:0.14em;text-transform:uppercase;color:rgba(255,255,255,0.45);
      text-decoration:none;display:inline-flex;align-items:center;gap:8px;transition:color 0.2s;
    }
    .back-banner a:hover{color:var(--accent);}

    /* HERO */
    .hero{
      padding:80px 60px 60px;
      background:linear-gradient(180deg,var(--dark) 0%,var(--mid) 100%);
      position:relative;overflow:hidden;
    }
    .hero::after{
      content:'';position:absolute;inset:0;z-index:0;
      background:linear-gradient(rgba(53,90,148,0.06) 1px,transparent 1px),
                 linear-gradient(90deg,rgba(53,90,148,0.06) 1px,transparent 1px);
      background-size:60px 60px;
    }
    .hero-inner{position:relative;z-index:1;max-width:1200px;margin:0 auto;}
    .section-label{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
    .hero h1{font-family:'Rajdhani',sans-serif;font-size:clamp(2.2rem,5vw,4rem);font-weight:700;line-height:1.05;margin-bottom:20px;}
    .hero-meta{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:20px;}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;font-size:0.88rem;color:rgba(255,255,255,0.55);}
    .divider{width:50px;height:2px;background:var(--blue);margin-top:8px;}

    /* SHARE */
    .share-bar{
      display:flex;align-items:center;gap:12px;margin-top:24px;
    }
    .share-label{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);}
    .share-btn{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 16px;border-radius:3px;font-family:'Rajdhani',sans-serif;
      font-size:0.8rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
      text-decoration:none;transition:background 0.2s,transform 0.2s;cursor:pointer;border:none;
    }
    .share-btn:hover{transform:translateY(-1px);}
    .share-linkedin{background:#0077B5;color:#fff;}
    .share-linkedin:hover{background:#0069a0;}
    .share-copy{background:rgba(53,90,148,0.25);color:rgba(255,255,255,0.6);border:1px solid rgba(53,90,148,0.35);}
    .share-copy:hover{background:rgba(53,90,148,0.4);color:#fff;}

    /* CONTENT */
    .content{padding:60px 60px 120px;max-width:1200px;margin:0 auto;}

    .description{
      font-size:1rem;line-height:1.8;color:rgba(255,255,255,0.6);
      max-width:760px;margin-bottom:56px;
    }

    /* COVER IMAGE */
    .cover-img{
      width:100%;max-height:480px;object-fit:cover;border-radius:4px;
      border:1px solid rgba(53,90,148,0.2);margin-bottom:48px;
    }

    /* PHOTO GRID */
    .section-title{
      font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;
      letter-spacing:0.18em;text-transform:uppercase;color:rgba(255,255,255,0.35);
      margin-bottom:20px;
    }
    .photo-grid{
      display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
      gap:10px;margin-bottom:56px;
    }
    .photo-grid img{
      width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:2px;
      border:1px solid rgba(53,90,148,0.2);
      cursor:pointer;transition:transform 0.2s,border-color 0.2s;
    }
    .photo-grid img:hover{transform:scale(1.02);border-color:var(--accent);}

    /* VIDEO LIST */
    .video-list{display:flex;flex-direction:column;gap:12px;margin-bottom:56px;}
    .video-item{
      display:flex;align-items:center;gap:12px;
      background:rgba(53,90,148,0.08);border:1px solid rgba(53,90,148,0.2);
      padding:12px 16px;border-radius:2px;text-decoration:none;
      transition:border-color 0.2s,background 0.2s;
    }
    .video-item:hover{border-color:var(--accent);background:rgba(53,90,148,0.15);}
    .video-item-title{font-family:'Rajdhani',sans-serif;font-size:0.95rem;font-weight:600;color:var(--white);}

    /* LIGHTBOX */
    .lightbox{
      display:none;position:fixed;inset:0;z-index:200;
      background:rgba(0,0,0,0.92);align-items:center;justify-content:center;
    }
    .lightbox.open{display:flex;}
    .lightbox-img-wrap{position:relative;display:flex;align-items:center;justify-content:center;}
    .lightbox img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:4px;display:block;}
    .lightbox-close{
      position:absolute;top:24px;right:32px;font-size:2rem;
      color:rgba(255,255,255,0.6);cursor:pointer;line-height:1;z-index:201;
    }
    .lightbox-close:hover{color:var(--white);}
    .lightbox-arrow{
      position:absolute;top:50%;transform:translateY(-50%);
      background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);
      font-size:1.8rem;cursor:pointer;padding:16px 12px;border-radius:4px;
      transition:background 0.2s,color 0.2s;z-index:201;line-height:1;
      backdrop-filter:blur(4px);
    }
    .lightbox-arrow:hover{background:rgba(255,255,255,0.2);color:var(--white);}
    .lightbox-prev{left:16px;}
    .lightbox-next{right:16px;}
    .lightbox-counter{
      position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
      font-family:'Rajdhani',sans-serif;font-size:0.82rem;letter-spacing:0.12em;
      color:rgba(255,255,255,0.4);
    }

    /* FOOTER */
    footer{
      background:rgba(9,37,84,0.35);border-top:1px solid rgba(53,90,148,0.2);
      padding:40px 60px;display:flex;align-items:center;
      justify-content:space-between;flex-wrap:wrap;gap:20px;
    }
    footer img{height:28px;mix-blend-mode:screen;filter:brightness(1.4);}
    .footer-copy{font-size:0.78rem;color:rgba(255,255,255,0.3);letter-spacing:0.08em;}

    /* loading / error */
    .loading{text-align:center;padding:100px 40px;color:rgba(255,255,255,0.3);}

    @media(max-width:900px){
      nav{padding:16px 24px;} nav ul{gap:16px;}
      .hero,.content,.back-banner{padding-left:24px;padding-right:24px;}
      footer{padding:32px 24px;}
    }
    @media(max-width:560px){nav ul{display:none;}}
  </style>
</head>
<body>

<nav>
  <a href="index.html"><img src="images/logo.jpg" alt="MetroAir Inc."/></a>
  <ul>
    <li><a href="index.html#multicruiser">Multicruiser</a></li>
    <li><a href="index.html#fpv">FPV Drone</a></li>
    <li><a href="index.html#vision">Vision</a></li>
    <li><a href="index.html#videos">Videos</a></li>
    <li><a href="exhibitions.html" class="active">Exhibitions</a></li>
    <li><a href="index.html#whitepaper">Whitepaper</a></li>
    <li><a href="index.html#connect">Contact</a></li>
  </ul>
</nav>

<div class="back-banner">
  <a href="exhibitions.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    All Exhibitions
  </a>
</div>

<div id="page-content">
  <div class="loading">Loading...</div>
</div>

<!-- lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <div class="lightbox-close" onclick="closeLightbox()">×</div>
  <button class="lightbox-arrow lightbox-prev" onclick="event.stopPropagation();lightboxNav(-1)">‹</button>
  <div class="lightbox-img-wrap" onclick="event.stopPropagation()">
    <img id="lightbox-img" src="" alt=""/>
  </div>
  <button class="lightbox-arrow lightbox-next" onclick="event.stopPropagation();lightboxNav(1)">›</button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
</div>

<footer>
  <a href="index.html"><img src="images/logo.jpg" alt="MetroAir Inc."/></a>
  <div class="footer-copy">© 2024 MetroAir Inc. All rights reserved.</div>
</footer>

<script>
  let photos = [];
  let currentPhotoIdx = 0;

  function parseFrontmatter(text) {
    const match = text.match(/^---\n([\s\S]*?)\n---/);
    if (!match) return {};
    const yaml = match[1];
    const result = {};
    const lines = yaml.split('\n');
    let currentKey = null;
    let inList = false;
    let listItems = [];
    let subObj = {};

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      const kvMatch = line.match(/^([a-zA-Z_]+):\s*(.*)$/);
      if (kvMatch && !line.startsWith(' ') && !line.startsWith('-')) {
        if (currentKey && inList) {
          if (Object.keys(subObj).length) { listItems.push(subObj); subObj = {}; }
          result[currentKey] = listItems;
          listItems = [];
          inList = false;
        }
        currentKey = kvMatch[1];
        const val = kvMatch[2].trim();
        if (val === '') { inList = true; listItems = []; }
        else { result[currentKey] = val; inList = false; }
        continue;
      }
      const simpleItem = line.match(/^\s*-\s+(.+)$/);
      if (simpleItem && inList && !simpleItem[1].match(/^[a-zA-Z_]+:\s*/)) {
        listItems.push(simpleItem[1].trim().replace(/^['"]|['"]$/g, ''));
        continue;
      }
      const subKey = line.match(/^  ([a-zA-Z_]+):\s*(.*)$/);
      if (subKey && inList) {
        subObj[subKey[1]] = subKey[2].trim().replace(/^['"]|['"]$/g, '');
        continue;
      }
      const listSubStart = line.match(/^- ([a-zA-Z_]+):\s*(.*)$/);
      if (listSubStart && inList) {
        if (Object.keys(subObj).length) listItems.push(subObj);
        subObj = {};
        subObj[listSubStart[1]] = listSubStart[2].trim().replace(/^['"]|['"]$/g, '');
        continue;
      }
    }
    if (currentKey && inList) {
      if (Object.keys(subObj).length) listItems.push(subObj);
      result[currentKey] = listItems;
    }
    return result;
  }

  async function loadExhibition() {
    const params = new URLSearchParams(window.location.search);
    const slug = params.get('slug');

    if (!slug) {
      window.location.href = 'exhibitions.html';
      return;
    }

    try {
      const apiUrl = `https://api.github.com/repos/metroaircreator/metroair-website/contents/exhibitions/${slug}`;
      const res = await fetch(apiUrl);
      if (!res.ok) throw new Error('Not found');
      const fileData = await res.json();
      const text = atob(fileData.content.replace(/\n/g, ''));
      const ex = parseFrontmatter(text);

      // Update page title & OG tags
      const title = ex.title || 'Exhibition';
      const desc = ex.description || `${ex.location || ''}${ex.city ? ', ' + ex.city : ''} — MetroAir Inc.`;
      photos = Array.isArray(ex.photos) ? ex.photos : (ex.photos ? [ex.photos] : []);
      const firstPhoto = photos[0] || '';
      const pageUrl = window.location.href;

      document.getElementById('page-title').textContent = `${title} — MetroAir Inc.`;
      document.getElementById('og-title').content = title;
      document.getElementById('og-description').content = desc;
      document.getElementById('og-image').content = firstPhoto ? `https://metroair.kr${firstPhoto}` : '';
      document.getElementById('og-url').content = pageUrl;
      document.getElementById('tw-title').content = title;
      document.getElementById('tw-description').content = desc;
      document.getElementById('tw-image').content = firstPhoto ? `https://metroair.kr${firstPhoto}` : '';

      renderExhibition(ex, pageUrl);
    } catch(e) {
      document.getElementById('page-content').innerHTML = `
        <div class="loading">Exhibition not found. <a href="exhibitions.html" style="color:var(--accent)">Back to exhibitions</a></div>`;
    }
  }

  function renderExhibition(ex, pageUrl) {
    const videos = Array.isArray(ex.videos) ? ex.videos : [];
    const dateStr = ex.date ? new Date(ex.date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : '';

    const linkedInUrl = `https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(pageUrl)}`;

    document.getElementById('page-content').innerHTML = `
      <div class="hero">
        <div class="hero-inner">
          <div class="section-label">MetroAir Inc. — Exhibition</div>
          <h1>${ex.title || 'Untitled'}</h1>
          <div class="hero-meta">
            ${dateStr ? `<div class="hero-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${dateStr}</div>` : ''}
            ${ex.location ? `<div class="hero-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${ex.location}${ex.city ? ', ' + ex.city : ''}</div>` : ''}
            ${photos.length ? `<div class="hero-badge"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>${photos.length} photo${photos.length>1?'s':''}</div>` : ''}
          </div>
          <div class="divider"></div>
         
        </div>
      </div>

      <div class="content">
        ${ex.description ? `<p class="description">${ex.description}</p>` : ''}

        ${photos.length ? `
          <div class="section-title">Photos</div>
          <div class="photo-grid">
            ${photos.map((p, i) => `<img src="${p}" alt="${ex.title}" onclick="openLightbox(${i})" loading="lazy"/>`).join('')}
          </div>
        ` : ''}

        ${videos.length ? `
          <div class="section-title">Videos</div>
          <div class="video-list">
            ${videos.map(v => {
              const ytId = (v.url||'').match(/(?:youtu\.be\/|v=)([^&?]+)/)?.[1];
              const thumb = ytId ? `https://img.youtube.com/vi/${ytId}/mqdefault.jpg` : '';
              return `<a href="${v.url||v}" target="_blank" rel="noopener" class="video-item">
                ${thumb ? `<img src="${thumb}" style="width:80px;height:45px;object-fit:cover;border-radius:2px;flex-shrink:0;" alt=""/>` : '<svg width="20" height="20" viewBox="0 0 24 24" fill="#4d9de0"><polygon points="5 3 19 12 5 21 5 3"/></svg>'}
                <div class="video-item-title">${v.title || 'Watch Video'}</div>
                <svg style="margin-left:auto;opacity:0.4" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </a>`;
            }).join('')}
          </div>
        ` : ''}
      </div>
    `;
  }

  function copyLink(url) {
    navigator.clipboard.writeText(url).then(() => {
      const btn = document.querySelector('.share-copy');
      if (btn) { btn.textContent = '✓ Copied!'; setTimeout(() => btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Copy Link`, 2000); }
    });
  }

  function openLightbox(idx) {
    currentPhotoIdx = idx;
    updateLightbox();
    document.getElementById('lightbox').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function updateLightbox() {
    document.getElementById('lightbox-img').src = photos[currentPhotoIdx] || '';
    const counter = document.getElementById('lightbox-counter');
    counter.textContent = photos.length > 1 ? (currentPhotoIdx + 1) + ' / ' + photos.length : '';
    document.querySelector('.lightbox-prev').style.display = photos.length > 1 ? '' : 'none';
    document.querySelector('.lightbox-next').style.display = photos.length > 1 ? '' : 'none';
  }

  function lightboxNav(dir) {
    currentPhotoIdx = (currentPhotoIdx + dir + photos.length) % photos.length;
    updateLightbox();
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lightboxNav(-1);
    if (e.key === 'ArrowRight') lightboxNav(1);
  });

  loadExhibition();
</script>
</body>
</html>
