<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetroAir Admin</title>
</head>
<body>
  <div id="bulk-upload-bar" style="display:none;position:fixed;bottom:24px;right:24px;z-index:9999;">
    <a href="/admin/bulk-upload.html" style="display:inline-flex;align-items:center;gap:8px;background:#355A94;color:#fff;padding:12px 20px;border-radius:4px;text-decoration:none;font-family:system-ui,sans-serif;font-size:0.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.4);">
      📷 Bulk Upload Photos
    </a>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Show bulk upload bar once CMS user is authenticated
    window.addEventListener('message', function(e) {
      if (e.data && typeof e.data === 'string' && e.data.includes('authorization:github:success')) {
        document.getElementById('bulk-upload-bar').style.display = 'block';
      }
    });
    // Also check if already logged in (token in localStorage)
    (function() {
      try {
        const user = localStorage.getItem('decap-cms-user') || localStorage.getItem('netlify-cms-user');
        if (user) document.getElementById('bulk-upload-bar').style.display = 'block';
      } catch(e) {}
    })();

    // Watch for dynamically added file inputs and allow multiple
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        mutation.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            const inputs = node.querySelectorAll ? node.querySelectorAll('input[type="file"]') : [];
            inputs.forEach(function(input) { input.setAttribute('multiple', 'multiple'); });
            if (node.tagName === 'INPUT' && node.type === 'file') {
              node.setAttribute('multiple', 'multiple');
            }
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
