<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetroAir Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div id="bulk-upload-bar" style="display:none;position:fixed;bottom:24px;right:24px;z-index:9999;">
    <a href="/admin/bulk-upload.html" style="display:inline-flex;align-items:center;gap:8px;background:#355A94;color:#fff;padding:12px 20px;border-radius:4px;text-decoration:none;font-family:system-ui,sans-serif;font-size:0.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,0.4);">
      📷 Bulk Upload Photos
    </a>
  </div>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    // Enable multi-file upload for photo list fields
    document.addEventListener('click', function(e) {
      // When a file input inside the CMS photo list is triggered, allow multiple
      const input = e.target.closest('input[type="file"]');
      if (input) {
        input.setAttribute('multiple', 'multiple');
      }
    }, true);

    // Show bulk upload button when logged in
    netlifyIdentity.on('init', u => { if(u) document.getElementById('bulk-upload-bar').style.display='block'; });
    netlifyIdentity.on('login', () => document.getElementById('bulk-upload-bar').style.display='block');
    netlifyIdentity.on('logout', () => document.getElementById('bulk-upload-bar').style.display='none');

    // Watch for dynamically added file inputs and patch them
    const observer = new MutationObserver(function(mutations) {
      mutations.forEach(function(mutation) {
        mutation.addedNodes.forEach(function(node) {
          if (node.nodeType === 1) {
            const inputs = node.querySelectorAll ? node.querySelectorAll('input[type="file"]') : [];
            inputs.forEach(function(input) {
              input.setAttribute('multiple', 'multiple');
            });
            if (node.tagName === 'INPUT' && node.type === 'file') {
              node.setAttribute('multiple', 'multiple');
            }
          }
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  </script>
</body>
</html>
