<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Bulk Photo Upload — MetroAir Admin</title>
  <style>
    :root{--navy:#092554;--blue:#355A94;--accent:#4d9de0;--dark:#070e1f;--white:#fff;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',system-ui,sans-serif;background:var(--dark);color:var(--white);min-height:100vh;padding:40px 24px;}
    .container{max-width:720px;margin:0 auto;}
    h1{font-size:1.6rem;font-weight:700;margin-bottom:6px;}
    .subtitle{color:rgba(255,255,255,0.45);font-size:0.88rem;margin-bottom:32px;}
    .back{display:inline-flex;align-items:center;gap:6px;font-size:0.8rem;color:rgba(255,255,255,0.4);text-decoration:none;margin-bottom:28px;transition:color .2s;}
    .back:hover{color:var(--accent);}
    label{display:block;font-size:0.78rem;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.5);margin-bottom:8px;}
    select{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(53,90,148,0.35);color:var(--white);padding:10px 14px;font-size:0.92rem;border-radius:3px;margin-bottom:24px;appearance:none;}
    select option{background:#0d1e3a;}
    .dropzone{border:2px dashed rgba(53,90,148,0.4);border-radius:6px;padding:60px 40px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;position:relative;margin-bottom:24px;}
    .dropzone.over{border-color:var(--accent);background:rgba(77,157,224,0.06);}
    .dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .dropzone-icon{font-size:2.5rem;margin-bottom:12px;}
    .dropzone-text{color:rgba(255,255,255,0.5);font-size:0.92rem;}
    .dropzone-text strong{color:var(--accent);}
    .preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:24px;}
    .preview-item{position:relative;aspect-ratio:1;border-radius:4px;overflow:hidden;background:rgba(53,90,148,0.1);}
    .preview-item img{width:100%;height:100%;object-fit:cover;}
    .preview-item .remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.7);border:none;color:white;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
    .preview-item .status{position:absolute;bottom:0;left:0;right:0;padding:4px 6px;font-size:0.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;text-align:center;}
    .status-uploading{background:rgba(77,157,224,0.85);}
    .status-done{background:rgba(40,167,69,0.85);}
    .status-error{background:rgba(220,53,69,0.85);}
    .btn{display:inline-block;padding:12px 32px;font-size:0.88rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;border-radius:3px;transition:background .2s,transform .2s;}
    .btn-primary{background:var(--blue);color:var(--white);}
    .btn-primary:hover{background:var(--accent);transform:translateY(-1px);}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .btn-outline{background:none;color:rgba(255,255,255,0.5);border:1px solid rgba(53,90,148,0.35);}
    .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
    .btn-github{background:#238636;color:#fff;display:inline-flex;align-items:center;gap:10px;}
    .btn-github:hover{background:#2ea043;}
    .msg{padding:14px 18px;border-radius:4px;font-size:0.88rem;margin-bottom:20px;}
    .msg-success{background:rgba(40,167,69,0.15);border:1px solid rgba(40,167,69,0.3);color:#7ee8a2;}
    .msg-error{background:rgba(220,53,69,0.15);border:1px solid rgba(220,53,69,0.3);color:#f4a9a9;}
    .msg-info{background:rgba(77,157,224,0.1);border:1px solid rgba(77,157,224,0.25);color:var(--accent);}
    #login-wall{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:16px;}
    #login-wall p{color:rgba(255,255,255,0.45);font-size:0.92rem;}
    #main-ui{display:none;}
    .user-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;padding:10px 16px;background:rgba(53,90,148,0.1);border:1px solid rgba(53,90,148,0.2);border-radius:4px;}
    .user-bar span{font-size:0.82rem;color:rgba(255,255,255,0.5);}
    .user-bar strong{color:var(--accent);}
    .logout-btn{font-size:0.75rem;color:rgba(255,255,255,0.35);cursor:pointer;background:none;border:none;text-decoration:underline;}
    .logout-btn:hover{color:rgba(255,255,255,0.6);}
  </style>
</head>
<body>
<div class="container">
  <a href="/admin/" class="back">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back to Admin
  </a>

  <div id="login-wall">
    <h1>Bulk Photo Upload</h1>
    <p>Log in with GitHub to upload photos.</p>
    <button class="btn btn-github" onclick="loginWithGitHub()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/></svg>
      Login with GitHub
    </button>
  </div>

  <div id="main-ui">
    <h1>Bulk Photo Upload</h1>
    <p class="subtitle">Select an exhibition, then drop multiple photos at once.</p>

    <div class="user-bar">
      <span>Logged in as <strong id="user-name">—</strong></span>
      <button class="logout-btn" onclick="logout()">Log out</button>
    </div>

    <div id="msg-area"></div>

    <div style="margin-bottom:24px;">
      <label>Exhibition</label>
      <select id="exhibition-select">
        <option value="">Loading exhibitions…</option>
      </select>
    </div>

    <div>
      <label>Photos</label>
      <div class="dropzone" id="dropzone">
        <input type="file" id="file-input" multiple accept="image/*"/>
        <div class="dropzone-icon">📷</div>
        <div class="dropzone-text"><strong>Click or drag photos here</strong><br/>Select multiple files at once</div>
      </div>
      <div class="preview-grid" id="preview-grid"></div>
    </div>

    <div style="display:flex;gap:12px;align-items:center;">
      <button class="btn btn-primary" id="upload-btn" onclick="startUpload()" disabled>Upload Photos</button>
      <button class="btn btn-outline" onclick="clearFiles()">Clear</button>
      <span id="count-label" style="font-size:0.82rem;color:rgba(255,255,255,0.35);"></span>
    </div>
  </div>
</div>

<script>
  const REPO = 'metroaircreator/metroair-website';
  const API = 'https://api.github.com/repos/' + REPO;
  let ghToken = null;
  let selectedFiles = [];

  // --- Auth ---
  function getStoredToken() {
    try { return sessionStorage.getItem('gh_bulk_token'); } catch(e) { return null; }
  }
  function storeToken(t) {
    try { sessionStorage.setItem('gh_bulk_token', t); } catch(e) {}
  }
  function clearToken() {
    try { sessionStorage.removeItem('gh_bulk_token'); } catch(e) {}
  }

  function loginWithGitHub() {
    const w = window.open('/api/auth', 'github-oauth', 'width=600,height=700,left=200,top=100');
    window.addEventListener('message', function handler(e) {
      if (!e.data || typeof e.data !== 'string') return;
      const match = e.data.match(/^authorization:github:success:(.+)$/);
      if (match) {
        window.removeEventListener('message', handler);
        const data = JSON.parse(match[1]);
        ghToken = data.token;
        storeToken(ghToken);
        onLogin();
      }
      const errMatch = e.data.match(/^authorization:github:error:(.+)$/);
      if (errMatch) {
        window.removeEventListener('message', handler);
        alert('Login failed. Please try again.');
      }
    });
  }

  async function onLogin() {
    // Get GitHub user info
    try {
      const res = await ghFetch('https://api.github.com/user');
      const user = await res.json();
      document.getElementById('user-name').textContent = user.login || user.name || 'GitHub User';
    } catch(e) {
      document.getElementById('user-name').textContent = 'GitHub User';
    }
    document.getElementById('login-wall').style.display = 'none';
    document.getElementById('main-ui').style.display = 'block';
    loadExhibitions();
  }

  function logout() {
    ghToken = null;
    clearToken();
    document.getElementById('main-ui').style.display = 'none';
    document.getElementById('login-wall').style.display = 'flex';
  }

  function ghFetch(url, options = {}) {
    return fetch(url, {
      ...options,
      headers: {
        'Authorization': 'token ' + ghToken,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json',
        ...(options.headers || {})
      }
    });
  }

  // Check for stored token on load
  window.addEventListener('load', function() {
    const t = getStoredToken();
    if (t) { ghToken = t; onLogin(); }
  });

  // --- Exhibitions ---
  async function loadExhibitions() {
    const sel = document.getElementById('exhibition-select');
    try {
      const res = await ghFetch(API + '/contents/exhibitions');
      const files = await res.json();
      const mdFiles = files.filter(f => f.name.endsWith('.md'));
      sel.innerHTML = '<option value="">— Select an exhibition —</option>';
      mdFiles.sort((a, b) => b.name.localeCompare(a.name)).forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.name;
        opt.textContent = f.name.replace(/^\d{4}-\d{2}-\d{2}-/, '').replace(/-/g, ' ').replace('.md', '');
        sel.appendChild(opt);
      });
    } catch(e) {
      sel.innerHTML = '<option value="">Could not load exhibitions</option>';
    }
  }

  document.getElementById('exhibition-select').addEventListener('change', updateBtn);

  // --- Dropzone ---
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('file-input');

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('over');
    addFiles(Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/')));
  });
  fileInput.addEventListener('change', e => {
    addFiles(Array.from(e.target.files));
    fileInput.value = '';
  });

  function addFiles(files) {
    files.forEach(f => {
      if (!selectedFiles.find(x => x.name === f.name && x.size === f.size)) selectedFiles.push(f);
    });
    renderPreviews();
    updateBtn();
  }

  function renderPreviews() {
    const grid = document.getElementById('preview-grid');
    grid.innerHTML = '';
    selectedFiles.forEach((f, i) => {
      const div = document.createElement('div');
      div.className = 'preview-item';
      div.id = 'preview-' + i;
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      const btn = document.createElement('button');
      btn.className = 'remove';
      btn.textContent = '×';
      btn.onclick = () => { selectedFiles.splice(i, 1); renderPreviews(); updateBtn(); };
      div.appendChild(img);
      div.appendChild(btn);
      grid.appendChild(div);
    });
    document.getElementById('count-label').textContent =
      selectedFiles.length ? selectedFiles.length + ' photo' + (selectedFiles.length > 1 ? 's' : '') + ' selected' : '';
  }

  function clearFiles() {
    selectedFiles = [];
    renderPreviews();
    updateBtn();
    document.getElementById('msg-area').innerHTML = '';
  }

  function updateBtn() {
    const sel = document.getElementById('exhibition-select').value;
    document.getElementById('upload-btn').disabled = !sel || selectedFiles.length === 0;
  }

  function showMsg(text, type) {
    document.getElementById('msg-area').innerHTML = `<div class="msg msg-${type}">${text}</div>`;
  }

  function setStatus(i, label, cls) {
    const item = document.getElementById('preview-' + i);
    if (!item) return;
    let s = item.querySelector('.status');
    if (!s) { s = document.createElement('div'); s.className = 'status'; item.appendChild(s); }
    s.className = 'status ' + cls;
    s.textContent = label;
  }

  // --- Upload ---
  async function startUpload() {
    const exhibitionFile = document.getElementById('exhibition-select').value;
    if (!exhibitionFile || selectedFiles.length === 0) return;

    const btn = document.getElementById('upload-btn');
    btn.disabled = true;
    btn.textContent = 'Uploading…';
    showMsg('Uploading photos…', 'info');

    const uploadedPaths = [];
    let errors = 0;

    for (let i = 0; i < selectedFiles.length; i++) {
      const file = selectedFiles[i];
      setStatus(i, 'Uploading…', 'status-uploading');
      try {
        const path = await uploadFile(file);
        uploadedPaths.push(path);
        setStatus(i, 'Done ✓', 'status-done');
      } catch(e) {
        console.error(e);
        setStatus(i, 'Error', 'status-error');
        errors++;
      }
    }

    if (uploadedPaths.length > 0) {
      try {
        await updateExhibitionMarkdown(exhibitionFile, uploadedPaths);
        showMsg(
          `✓ ${uploadedPaths.length} photo${uploadedPaths.length > 1 ? 's' : ''} uploaded and added to the exhibition!` +
          (errors ? ` (${errors} failed)` : ''),
          'success'
        );
      } catch(e) {
        showMsg('Photos uploaded but could not update exhibition. Paths: ' + uploadedPaths.join(', '), 'error');
      }
    } else {
      showMsg('All uploads failed. Please try again.', 'error');
    }

    btn.disabled = false;
    btn.textContent = 'Upload Photos';
  }

  async function uploadFile(file) {
    const ext = file.name.split('.').pop();
    const filename = Date.now() + '-' + Math.random().toString(36).slice(2, 7) + '.' + ext;
    const path = 'uploads/' + filename;
    const base64 = await toBase64(file);

    const res = await ghFetch(API + '/contents/' + path, {
      method: 'PUT',
      body: JSON.stringify({ message: 'Upload ' + filename, content: base64 })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || 'Upload failed');
    }
    return '/' + path;
  }

  async function updateExhibitionMarkdown(filename, newPaths) {
    const res = await ghFetch(API + '/contents/exhibitions/' + filename);
    const data = await res.json();
    const currentContent = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ''))));

    const existingPhotos = [];
    const photoMatch = currentContent.match(/^photos:\n((?:[ \t]*- [^\n]+\n?)*)/m);
    if (photoMatch) {
      photoMatch[1].trim().split('\n').forEach(l => {
        const m = l.match(/^\s*-\s+(.+)$/);
        if (m) existingPhotos.push(m[1].trim());
      });
    }

    const allPhotos = [...existingPhotos, ...newPaths];
    const photoBlock = 'photos:\n' + allPhotos.map(p => '  - ' + p).join('\n') + '\n';

    let newContent;
    if (photoMatch) {
      newContent = currentContent.replace(/^photos:\n((?:[ \t]*- [^\n]+\n?)*)/m, photoBlock);
    } else {
      newContent = currentContent.replace(/(\n---\s*$)/, '\n' + photoBlock + '---');
    }

    const encoded = btoa(unescape(encodeURIComponent(newContent)));
    const updateRes = await ghFetch(API + '/contents/exhibitions/' + filename, {
      method: 'PUT',
      body: JSON.stringify({
        message: 'Add ' + newPaths.length + ' photo(s) to ' + filename,
        content: encoded,
        sha: data.sha
      })
    });

    if (!updateRes.ok) {
      const err = await updateRes.json().catch(() => ({}));
      throw new Error(err.message || 'Update failed');
    }
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }
</script>
</body>
</html>
